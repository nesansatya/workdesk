    const WORKFLOW_FIELDS = [

    const PRIORITIES = {
      high:   { label: "High",   color: "#FF5757" },
      medium: { label: "Medium", color: "#FFB547" },
      low:    { label: "Low",    color: "#57FF9C" },
    };

    // ─── Helpers ────────────────────────────────────────────────────────────────
    const uid = () => Math.random().toString(36).slice(2, 10);
    const fmtDate = (s) => s ? new Date(s+"T00:00:00").toLocaleDateString("en-MY",{day:"numeric",month:"short"}) : "";
    const fmtDateFull = (s) => s ? new Date(s+"T00:00:00").toLocaleDateString("en-MY",{day:"numeric",month:"short",year:"numeric"}) : "";
    function daysUntil(s){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(s+"T00:00:00")-t)/86400000);}
    function dayLabel(d){
      if(d<0)  return{text:`${Math.abs(d)}d overdue`,color:"#FF5757"};
      if(d===0)return{text:"Today",color:"#FF5757"};
      if(d===1)return{text:"Tomorrow",color:"#FFB547"};
      if(d<=7) return{text:`${d}d left`,color:"#FFB547"};
      if(d<=30)return{text:`${d}d left`,color:"#57FF9C"};
      return{text:`${d}d left`,color:"#666"};
    }

    // ─── AI ─────────────────────────────────────────────────────────────────────
    async function callClaude(messages, system="") {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1200, system, messages }),
      });
      if (!res.ok) throw new Error("API error");
      const data = await res.json();
      return data.content?.map(b => b.text||"").join("") || "No response.";
    }
    function buildSystemPrompt(tasks, clients, renewals, workflow) {
      const today = new Date().toISOString().split("T")[0];
      const wf = WORKFLOW_FIELDS.filter(f=>workflow[f.key]?.trim()).map(f=>`${f.icon} ${f.label}:\n${workflow[f.key]}`).join("\n\n");
      return `You are a personalised AI work assistant for a Malaysian Senior Tax Executive who also runs a web design side business. Adapt ALL responses to their workflow.
TODAY: ${today}
WORKFLOW PROFILE:\n${wf||"Not set yet."}
CLIENTS:\n${clients.map(c=>`• ${c.name} (${c.type==="tax"?"Tax":"Web"}, ${c.email})`).join("\n")}
PENDING TASKS:\n${tasks.filter(t=>!t.done).map(t=>{const c=clients.find(x=>x.id===t.clientId);const d=daysUntil(t.dueDate);return`• [${t.priority.toUpperCase()}] ${t.title} | ${t.dueDate} (${d>=0?d+"d left":Math.abs(d)+"d OVERDUE"}) | ${t.category}${c?" | "+c.name:""}${t.notes?" | "+t.notes:""}`;}).join("\n")}
RENEWALS:\n${renewals.filter(r=>r.status!=="done").map(r=>{const c=clients.find(x=>x.id===r.clientId);const d=daysUntil(r.renewalDate);return`• ${r.service} for ${c?.name||"?"} | ${r.renewalDate} (${d}d) | Bill: RM${r.billingAmount} | Profit: RM${r.billingAmount-r.cost}`;}).join("\n")}
Office hours: 9am–6pm, lunch 1–2pm. Currency: RM. Be concise and practical.`;
    }

    // ─── CSS ────────────────────────────────────────────────────────────────────
    const CSS = `

    ::-webkit-scrollbar{display:none;}

    // ─── Main App ───────────────────────────────────────────────────────────────
    function App() {
      const load=(k,def)=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch{return def;}};
      const [tasks,    setTasks]    = useState(()=>load("wdm_tasks",   DEFAULT_TASKS));
      const [clients,  setClients]  = useState(()=>load("wdm_clients", DEFAULT_CLIENTS));
      const [renewals, setRenewals] = useState(()=>load("wdm_renewals",DEFAULT_RENEWALS));
      const [workflow, setWorkflow] = useState(()=>load("wdm_workflow",DEFAULT_WORKFLOW));
      const [view,       setView]       = useState("home");
      const [now,        setNow]        = useState(new Date());
      const [filterCat,  setFilterCat]  = useState("all");
      const [isOnline,   setIsOnline]   = useState(navigator.onLine);
      const [showAddTask,    setShowAddTask]    = useState(false);
      const [showAddRenewal, setShowAddRenewal] = useState(false);
      const [showAddClient,  setShowAddClient]  = useState(false);
      const [editTask,       setEditTask]       = useState(null);
      const [aiOpen,      setAiOpen]      = useState(false);
      const [aiTab,       setAiTab]       = useState("chat");
      const [chatHistory, setChatHistory] = useState([{role:"assistant",content:"Hi! I'm your AI assistant. Ask me anything about your tasks, clients, or deadlines. 👋\n\n⚠️ Note: AI features require internet connection."}]);
      const [chatInput,   setChatInput]   = useState("");
      const [aiLoading,   setAiLoading]   = useState(false);
      const [briefing,    setBriefing]    = useState("");
      const [emailDraft,  setEmailDraft]  = useState("");
      const [emailCtx,    setEmailCtx]    = useState({clientId:"",purpose:""});
      const [suggestions, setSuggestions] = useState([]);
      const chatEndRef = useRef(null);
      const [wfEdits,    setWfEdits]    = useState({});
      const [wfSaved,    setWfSaved]    = useState(false);
      const [wfExpanded, setWfExpanded] = useState(null);

      useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);
      useEffect(()=>{
        const on=()=>setIsOnline(true);
        const off=()=>setIsOnline(false);
        window.addEventListener("online",on);
        window.addEventListener("offline",off);
        return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
      },[]);
      useEffect(()=>{try{localStorage.setItem("wdm_tasks",   JSON.stringify(tasks));}catch{}},[tasks]);
      useEffect(()=>{try{localStorage.setItem("wdm_clients", JSON.stringify(clients));}catch{}},[clients]);
      useEffect(()=>{try{localStorage.setItem("wdm_renewals",JSON.stringify(renewals));}catch{}},[renewals]);
      useEffect(()=>{try{localStorage.setItem("wdm_workflow",JSON.stringify(workflow));}catch{}},[workflow]);
      useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[chatHistory,aiLoading]);

      const today    = now.toISOString().split("T")[0];
      const hour     = now.getHours();
      const isOffice = hour>=9&&hour<18;
      const isLunch  = hour>=13&&hour<14;
      const greet    = hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
      const todayTasks     = tasks.filter(t=>t.dueDate===today&&!t.done);
      const overdueTasks   = tasks.filter(t=>t.dueDate<today&&!t.done);
      const upcomingTasks  = tasks.filter(t=>t.dueDate>today&&!t.done).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
      const urgentRenewals = renewals.filter(r=>daysUntil(r.renewalDate)<=30&&r.status!=="done");
      const wfFilled = WORKFLOW_FIELDS.filter(f=>workflow[f.key]?.trim()).length;
      const wfPct    = Math.round((wfFilled/WORKFLOW_FIELDS.length)*100);
      const toggleDone  = (id)=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
      const deleteTask  = (id)=>setTasks(ts=>ts.filter(t=>t.id!==id));
      const markRenDone = (id)=>setRenewals(rs=>rs.map(r=>r.id===id?{...r,status:"done"}:r));
      const sys = buildSystemPrompt(tasks,clients,renewals,workflow);
      const saveWorkflow=()=>{setWorkflow(w=>({...w,...wfEdits}));setWfEdits({});setWfSaved(true);setTimeout(()=>setWfSaved(false),2200);};

      const sendChat=async()=>{
        if(!chatInput.trim()||aiLoading)return;
        if(!isOnline){setChatHistory(h=>[...h,{role:"user",content:chatInput},{role:"assistant",content:"⚠️ You're offline. AI features require an internet connection. Your tasks and data are still available!"}]);setChatInput("");return;}
        const userMsg={role:"user",content:chatInput.trim()};
        const newHist=[...chatHistory,userMsg];
        setChatHistory(newHist);setChatInput("");setAiLoading(true);
        try{const r=await callClaude(newHist.map(m=>({role:m.role,content:m.content})),sys);setChatHistory(h=>[...h,{role:"assistant",content:r}]);}
        catch{setChatHistory(h=>[...h,{role:"assistant",content:"Connection error. Please check your internet and try again."}]);}
        setAiLoading(false);
      };
      const genBriefing=async()=>{
        if(!isOnline){setBriefing("⚠️ You're offline. Daily briefing requires internet connection.");return;}
        setAiLoading(true);setBriefing("");
        try{const r=await callClaude([{role:"user",content:`Generate my personalised daily briefing for today (${today}). Include: priority actions, overdue items, renewals this month, and a time-blocked schedule for 9am–6pm (skip 1–2pm lunch). Be specific and concise.`}],sys);setBriefing(r);}
        catch{setBriefing("Failed to connect. Check your internet and try again.");}
        setAiLoading(false);
      };
      const genEmail=async()=>{
        if(!emailCtx.clientId||!emailCtx.purpose)return;
        if(!isOnline){setEmailDraft("⚠️ You're offline. Email drafting requires internet connection.");return;}
        const cl=clients.find(c=>c.id===emailCtx.clientId);
        setAiLoading(true);setEmailDraft("");
        try{const r=await callClaude([{role:"user",content:`Draft a professional email to ${cl.name} (${cl.email}) for: "${emailCtx.purpose}". Match my communication style from my workflow profile. Include subject line. Keep concise.`}],sys);setEmailDraft(r);}
        catch{setEmailDraft("Connection error. Try again.");}
        setAiLoading(false);
      };
      const genSuggestions=async()=>{
        if(!isOnline){setSuggestions([]);return;}
        setAiLoading(true);setSuggestions([]);
        try{const r=await callClaude([{role:"user",content:`Suggest 5 tasks I should add based on my workflow routines and current tasks. Return ONLY JSON array: [{"title":"...","category":"tax|web|social|billing|admin","priority":"high|medium|low","dueDate":"YYYY-MM-DD","notes":"...","reason":"..."}]. Today is ${today}.`}],sys);
          setSuggestions(JSON.parse(r.replace(/```json|```/g,"").trim()));}
        catch{setSuggestions([]);}
        setAiLoading(false);
      };
      const addSuggested=(s)=>{setTasks(ts=>[...ts,{...s,id:uid(),done:false,clientId:"",time:""}]);setSuggestions(ss=>ss.filter(x=>x!==s));};
      const openAI=(tab,cb)=>{setAiOpen(true);setAiTab(tab);if(cb)cb();};
      const filteredTasks=tasks.filter(t=>{
        if(filterCat==="all")return true;
        if(filterCat==="done")return t.done;
        return t.category===filterCat&&!t.done;
      }).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return a.dueDate.localeCompare(b.dueDate);});

      return (
        <div className="app">
          <style>{CSS}</style>

          {/* Offline banner */}
          {!isOnline && <div className="offline-banner">📴 Offline — All data is saved locally. AI features paused.</div>}

          {/* TOP BAR */}
          <div className="topbar">
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:30,height:30,background:"linear-gradient(135deg,#e8c858,#a07818)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>⚡</div>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#e8c858"}}>WorkDesk</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,color:isLunch?"#ffb547":isOffice?"#57ff9c":"#555",background:"#111",border:"1px solid #1a1a22",padding:"3px 9px",borderRadius:12,fontWeight:600}}>
                {isLunch?"🍽":"🏢"} {now.toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit"})}
              </span>
              <button className="btn btn-ai" style={{padding:"7px 12px",fontSize:13,opacity:isOnline?1:.5}} onClick={()=>setAiOpen(o=>!o)}>✦ AI</button>
            </div>
          </div>

          {/* SCROLL CONTENT */}
          <div className="scroll-area">

            {/* ═══ HOME ═══ */}
            {view==="home"&&(
              <div>
                <div style={{marginBottom:16}}>
                  <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,letterSpacing:"-.01em"}}>{greet} 👋</h1>
                  <p style={{color:"#555",fontSize:13,marginTop:3}}>{now.toLocaleDateString("en-MY",{weekday:"long",day:"numeric",month:"long"})}</p>
                </div>
                <div className="stat-row">
                  {[
                    {label:"Today",v:todayTasks.length,c:"#e8c858",i:"📅"},
                    {label:"Overdue",v:overdueTasks.length,c:"#ff5757",i:"⚠️"},
                    {label:"Renewals <30d",v:urgentRenewals.length,c:"#38c3e8",i:"🔄"},
                    {label:"Pending",v:tasks.filter(t=>!t.done).length,c:"#a8e838",i:"📋"},
                  ].map(s=>(
                    <div key={s.label} className="stat-card">
                      <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
                      <div style={{fontSize:26,fontWeight:700,color:s.c,fontFamily:"'Playfair Display',serif"}}>{s.v}</div>
                      <div style={{fontSize:11.5,color:"#555",marginTop:2}}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"linear-gradient(135deg,#0d0c1e,#080e18)",border:"1px solid #181830",borderRadius:14,padding:"12px 14px",marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                    <span style={{background:"linear-gradient(135deg,#2a1f5a,#1a3a5a)",border:"1px solid #3a2a7a",borderRadius:12,padding:"2px 8px",fontSize:10,color:"#a090ff",fontWeight:700}}>✦ AI</span>
                    <span style={{fontSize:12,color:isOnline?"#555":"#6b5010"}}>{isOnline?"Personalised for your workflow":"Offline — AI paused"}</span>
                  </div>
                  <div className="qa-row">
                    <button className="qa-btn" onClick={()=>openAI("briefing",genBriefing)}><span className="qa-icon">📋</span><span className="qa-label">Daily Brief</span></button>
                    <button className="qa-btn" onClick={()=>openAI("suggest",genSuggestions)}><span className="qa-icon">💡</span><span className="qa-label">Suggest Tasks</span></button>
                    <button className="qa-btn" onClick={()=>openAI("email",null)}><span className="qa-icon">✉️</span><span className="qa-label">Draft Email</span></button>
                    <button className="qa-btn" onClick={()=>openAI("chat",null)}><span className="qa-icon">💬</span><span className="qa-label">Ask AI</span></button>
                  </div>
                </div>
                {overdueTasks.length>0&&(
                  <div style={{marginBottom:14}}>
                    <div className="sec-head">
                      <div style={{width:3,height:16,background:"#ff5757",borderRadius:2}}/>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#ff8080"}}>Overdue ({overdueTasks.length})</span>
                    </div>
                    {overdueTasks.slice(0,3).map(t=><MTaskRow key={t.id} task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/>)}

                <div style={{marginBottom:14}}>
                  <div className="sec-head">
                    <div style={{width:3,height:16,background:"#e8c858",borderRadius:2}}/>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#ccc"}}>Today — {now.toLocaleDateString("en-MY",{day:"numeric",month:"short"})}</span>
                  </div>
                  {todayTasks.length===0

                {upcomingTasks.length>0&&(

                    <div className="sec-head">
                      <div style={{width:3,height:16,background:"#38c3e8",borderRadius:2}}/>

                    </div>
                    {upcomingTasks.slice(0,4).map(t=><MTaskRow key={t.id} task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/>)}

                )}
                {urgentRenewals.length>0&&(
                  <div>
                    <div className="sec-head">
                      <div style={{width:3,height:16,background:"#38c3e8",borderRadius:2}}/>

                    {urgentRenewals.slice(0,3).map(r=>{
                      const cl=clients.find(c=>c.id===r.clientId);
                      const dl=dayLabel(daysUntil(r.renewalDate));
                      return(
                        <div key={r.id} className="card-sm" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:600,fontSize:13.5,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.service}</div>
                            <div style={{fontSize:12,color:"#555"}}>{cl?.name} · <span style={{color:"#57ff9c",fontWeight:600}}>RM {r.billingAmount}</span></div>
                          </div>
                          <span style={{fontSize:12,fontWeight:700,color:dl.color,flexShrink:0,marginLeft:8}}>{dl.text}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* ═══ TASKS ═══ */}
            {view==="tasks"&&(
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                  <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22}}>Tasks</h1>
                  <div style={{display:"flex",gap:7}}>
                    <button className="btn btn-ai btn-sm" onClick={()=>openAI("suggest",genSuggestions)}>✦</button>
                    <button className="btn btn-gold btn-sm" onClick={()=>setShowAddTask(true)}>+ Add</button>
                  </div>
                </div>
                <div className="chips">
                  {[["all","All"],["done","Done ✓"],["tax","📋 Tax"],["web","🌐 Web"],["social","📱 Social"],["billing","💰 Billing"],["admin","📁 Admin"]].map(([k,l])=>(
                    <button key={k} className={`chip${filterCat===k?" active":""}`} onClick={()=>setFilterCat(k)}>{l}</button>
                  ))}
                </div>
                {filteredTasks.length===0
                  ?<div style={{color:"#444",fontSize:14,padding:"24px 0",textAlign:"center"}}>No tasks here.</div>
                  :filteredTasks.map(t=><MTaskRow key={t.id} task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/>)}
              </div>
            )}

            {/* ═══ RENEWALS ═══ */}
            {view==="renewals"&&(
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                  <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22}}>Renewals</h1>
                  <button className="btn btn-gold btn-sm" onClick={()=>setShowAddRenewal(true)}>+ Add</button>
                </div>
                {renewals.sort((a,b)=>a.renewalDate.localeCompare(b.renewalDate)).map(r=>{
                  const cl=clients.find(c=>c.id===r.clientId);
                  const d=daysUntil(r.renewalDate);
                  const dl=dayLabel(d);
                  const done=r.status==="done";
                  return(
                    <div key={r.id} className="card" style={{opacity:done?.4:1,borderColor:d<=7&&!done?"#2e1a1a":"#1c1c28"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                        <div style={{flex:1,minWidth:0,marginRight:8}}>
                          <div style={{fontWeight:600,fontSize:15,marginBottom:2}}>{r.service}</div>
                          <div style={{fontSize:13,color:"#555"}}>{cl?.name}</div>
                        </div>
                        <span style={{fontSize:12,fontWeight:700,color:dl.color,background:"#08080d",padding:"3px 9px",borderRadius:12,flexShrink:0}}>{done?"✓ Done":dl.text}</span>
                      </div>
                      <div className="ren-cols">
                        {[["Cost",`RM ${r.cost}`,"#ff7070"],["Billing",`RM ${r.billingAmount}`,"#57ff9c"],["Profit",`RM ${r.billingAmount-r.cost}`,"#e8c858"]].map(([l,v,c])=>(
                          <div key={l} className="ren-col">
                            <div className="lbl">{l}</div>
                            <div style={{fontWeight:700,color:c,fontSize:14}}>{v}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:12,color:"#555",marginBottom:10}}>📅 {fmtDateFull(r.renewalDate)}{r.notes?` · ${r.notes}`:""}</div>
                      {!done&&(
                        <div style={{display:"flex",gap:7}}>
                          <button className="btn btn-ai btn-sm" style={{flex:1}} onClick={()=>{openAI("email",null);setEmailCtx({clientId:r.clientId,purpose:`Send renewal invoice for ${r.service}, billing RM${r.billingAmount}, due ${r.renewalDate}`});}}>✦ Email</button>
                          <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>markRenDone(r.id)}>Mark Done</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ═══ CLIENTS ═══ */}
            {view==="clients"&&(
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                  <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22}}>Clients</h1>
                  <button className="btn btn-gold btn-sm" onClick={()=>setShowAddClient(true)}>+ Add</button>
                </div>
                {clients.map(c=>{
                  const cT=tasks.filter(t=>t.clientId===c.id&&!t.done);
                  const cR=renewals.filter(r=>r.clientId===c.id&&r.status!=="done");
                  const tot=renewals.filter(r=>r.clientId===c.id).reduce((a,r)=>a+r.billingAmount,0);
                  return(
                    <div key={c.id} className="card">
                      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:12}}>
                        <div style={{width:42,height:42,borderRadius:12,background:c.type==="tax"?"#2a1f06":"#061a2a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{c.type==="tax"?"📋":"🌐"}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                          <div style={{fontSize:12,color:"#444"}}>{c.email}</div>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:11}}>
                        <div style={{background:"#08080d",borderRadius:8,padding:"8px 10px"}}><div className="lbl">Tasks</div><div style={{fontWeight:700,color:"#e8c858"}}>{cT.length}</div></div>
                        <div style={{background:"#08080d",borderRadius:8,padding:"8px 10px"}}><div className="lbl">Renewals</div><div style={{fontWeight:700,color:"#38c3e8"}}>{cR.length}</div></div>
                        <div style={{background:"#08080d",borderRadius:8,padding:"8px 10px"}}><div className="lbl">Billed</div><div style={{fontWeight:700,color:"#57ff9c",fontSize:13}}>RM {tot}</div></div>
                      </div>
                      <button className="btn btn-ai btn-full btn-sm" onClick={()=>{openAI("email",null);setEmailCtx({clientId:c.id,purpose:""});}}>✦ Draft Email</button>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ═══ WORKFLOW ═══ */}
            {view==="workflow"&&(
              <div>
                <div style={{marginBottom:14}}>
                  <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:4}}>🧠 My Workflow</h1>
                  <p style={{fontSize:13,color:"#555",lineHeight:1.5}}>Feed the AI your routines so it learns how you work.</p>
                </div>
                <div className="card" style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:600,color:wfPct>=80?"#60c860":wfPct>=40?"#e8a838":"#c85050"}}>AI Profile {wfPct}% complete</span>
                    <span style={{fontSize:12,color:"#555"}}>{wfFilled}/{WORKFLOW_FIELDS.length} filled</span>
                  </div>
                  <div className="wf-bar-bg">
                    <div className="wf-bar" style={{width:`${wfPct}%`,background:wfPct>=80?"linear-gradient(90deg,#40a840,#60c860)":wfPct>=40?"linear-gradient(90deg,#c88020,#e8a838)":"linear-gradient(90deg,#a82020,#c84040)"}}/>
                  </div>
                  {Object.keys(wfEdits).length>0&&<button className="btn btn-ghost btn-full btn-sm" style={{marginTop:10,color:"#60d060",borderColor:"#2a3a2a"}} onClick={saveWorkflow}>💾 Save Changes</button>}
                  {wfSaved&&Object.keys(wfEdits).length===0&&<div style={{fontSize:12,color:"#60c860",textAlign:"center",marginTop:8}}>✓ Saved!</div>}
                </div>
                {WORKFLOW_FIELDS.map(field=>{
                  const current=wfEdits[field.key]!==undefined?wfEdits[field.key]:(workflow[field.key]||"");
                  const isFilled=current.trim().length>0;
                  const isExp=wfExpanded===field.key;
                  return(
                    <div key={field.key} className={`wf-card${isFilled?" filled":""}`}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setWfExpanded(isExp?null:field.key)}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:18}}>{field.icon}</span>
                          <span style={{fontWeight:600,fontSize:14,color:"#ccc"}}>{field.label}</span>
                          {isFilled&&<span style={{fontSize:10,background:"#0e1e0e",color:"#50a850",border:"1px solid #183018",borderRadius:10,padding:"1px 7px",fontWeight:700}}>✓</span>}
                        </div>
                        <span style={{fontSize:14,color:"#444",display:"inline-block",transform:isExp?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
                      </div>
                      {isExp&&(
                        <div style={{marginTop:10}}>
                          <textarea className="input" style={{fontSize:13.5}} value={current} placeholder={`Describe your ${field.label.toLowerCase()}…`} onChange={e=>setWfEdits(ed=>({...ed,[field.key]:e.target.value}))}/>
                          {Object.keys(wfEdits).length>0&&<button className="btn btn-ghost btn-full btn-sm" style={{marginTop:8,color:"#60d060",borderColor:"#2a3a2a"}} onClick={saveWorkflow}>💾 Save</button>}
                        </div>
                      )}
                      {!isExp&&isFilled&&<div style={{fontSize:12,color:"#555",marginTop:6,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{current}</div>}
                    </div>
                  );
                })}
              </div>
            )}

          </div>

          {/* BOTTOM NAV */}
          <div className="bottom-nav">
            {[["home","🏠","Home"],["tasks","✅","Tasks"],["renewals","🔄","Renewals"],["clients","👥","Clients"],["workflow","🧠","Workflow"]].map(([k,icon,label])=>(
              <button key={k} className={`tab-btn${view===k?" active":""}`} onClick={()=>setView(k)}>
                <span className="tab-icon">{icon}</span>
                <span className="tab-label">{label}</span>
              </button>
            ))}
          </div>

          {/* AI SHEET */}
          {aiOpen&&(
            <>
              <div className="sheet-overlay" onClick={()=>setAiOpen(false)}/>
              <div className="sheet">
                <div className="sheet-handle"/>
                <div style={{padding:"12px 16px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{background:"linear-gradient(135deg,#2a1f5a,#1a3a5a)",border:"1px solid #3a2a7a",borderRadius:12,padding:"2px 8px",fontSize:10,color:"#a090ff",fontWeight:700}}>✦ AI</span>

                    {!isOnline&&<span style={{fontSize:11,color:"#e8a838",background:"#1a1008",border:"1px solid #2a2008",borderRadius:10,padding:"1px 7px",fontWeight:600}}>Offline</span>}

                </div>

                        {["What's urgent today?","Any overdue?","Next renewal?","What to do now?"].map(p=>(
                          <button key={p} onClick={()=>setChatInput(p)} style={{flexShrink:0,background:"#10101a",border:"1px solid #1c1c2c",borderRadius:14,padding:"5px 11px",fontSize:12,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>{p}</button>
                        ))}
                      </div>
                      <div style={{padding:"10px 12px",borderTop:"1px solid #181828",display:"flex",gap:8,paddingBottom:"calc(10px + env(safe-area-inset-bottom))"}}>
                        <input className="input" style={{fontSize:14,padding:"11px 13px"}} placeholder={isOnline?"Ask anything…":"Offline — AI paused"} value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();sendChat();}}} disabled={!isOnline}/>
                        <button className="btn btn-gold" style={{padding:"11px 16px",flexShrink:0}} onClick={sendChat} disabled={aiLoading||!isOnline}>↑</button>
                      </div>
                    </>
                  )}
                  {aiTab==="briefing"&&(
                    <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
                      <p style={{fontSize:13.5,color:"#666",marginBottom:12,lineHeight:1.55}}>AI generates a personalised briefing based on your workflow routines and current tasks.</p>
                      <button className="btn btn-gold btn-full" style={{marginBottom:14}} onClick={genBriefing} disabled={aiLoading||!isOnline}>{aiLoading?"Generating…":!isOnline?"Offline":"📋 Generate Daily Briefing"}</button>
                      {aiLoading&&!briefing&&<div style={{display:"flex",gap:5,justifyContent:"center",padding:"16px"}}><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>}
                      {briefing&&<div className="ai-bubble assistant">{briefing}</div>}
                    </div>
                  )}
                  {aiTab==="email"&&(
                    <div style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:11}}>
                      <p style={{fontSize:13.5,color:"#666",lineHeight:1.5}}>AI drafts emails matching your communication style.</p>
                      <div><div className="lbl">Client</div>
                        <select className="select" value={emailCtx.clientId} onChange={e=>setEmailCtx(x=>({...x,clientId:e.target.value}))}>
                          <option value="">— Select client —</option>
                          {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                      </div>
                      <div><div className="lbl">Purpose</div>
                        <textarea className="input" placeholder="e.g. Renewal invoice for GoDaddy RM280 due April 15" value={emailCtx.purpose} onChange={e=>setEmailCtx(x=>({...x,purpose:e.target.value}))}/>
                      </div>
                      <button className="btn btn-gold btn-full" onClick={genEmail} disabled={aiLoading||!emailCtx.clientId||!emailCtx.purpose||!isOnline}>{aiLoading?"Drafting…":!isOnline?"Offline":"✦ Draft with AI"}</button>
                      {aiLoading&&!emailDraft&&<div style={{display:"flex",gap:5,justifyContent:"center"}}><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>}
                      {emailDraft&&(
                        <>
                          <div className="ai-bubble assistant">{emailDraft}</div>
                          <button className="btn btn-ghost btn-full" onClick={()=>navigator.clipboard?.writeText(emailDraft)}>📋 Copy</button>
                        </>
                      )}
                    </div>
                  )}
                  {aiTab==="suggest"&&(
                    <div style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
                      <p style={{fontSize:13.5,color:"#666",lineHeight:1.5}}>AI suggests tasks based on your routines and current workload.</p>
                      <button className="btn btn-gold btn-full" onClick={genSuggestions} disabled={aiLoading||!isOnline}>{aiLoading?"Analysing…":!isOnline?"Offline":"💡 Suggest Tasks For Me"}</button>
                      {aiLoading&&suggestions.length===0&&<div style={{display:"flex",gap:5,justifyContent:"center",padding:"16px"}}><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>}
                      {suggestions.map((s,i)=>{
                        const cat=CATEGORIES[s.category]||CATEGORIES.admin;
                        const pri=PRIORITIES[s.priority]||PRIORITIES.medium;
                        return(
                          <div key={i} className="card-sm">
                            <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>{s.title}</div>
                            <div style={{display:"flex",gap:5,marginBottom:6,flexWrap:"wrap"}}>
                              <span className="pill" style={{background:cat.bg,color:cat.color}}>{cat.icon} {cat.label}</span>
                              <span className="pill" style={{background:"#1a1014",color:pri.color}}>● {pri.label}</span>
                              {s.dueDate&&<span style={{fontSize:11.5,color:"#555"}}>📅 {fmtDate(s.dueDate)}</span>}
                            </div>
                            {s.reason&&<div style={{fontSize:12,color:"#6858a8",fontStyle:"italic",marginBottom:6}}>✦ {s.reason}</div>}
                            {s.notes&&<div style={{fontSize:12,color:"#555",marginBottom:6}}>{s.notes}</div>}
                            <button className="btn btn-gold btn-sm" onClick={()=>addSuggested(s)}>+ Add to Tasks</button>
                          </div>
                        );
                      })}
                      {!aiLoading&&suggestions.length===0&&<div style={{color:"#333",fontSize:13,textAlign:"center",padding:"16px 0"}}>Tap above to get AI suggestions.</div>}
                    </div>
                  )}
                </div>
              </div>
            </>
          )}

          {/* MODALS */}
          {showAddTask&&<MTaskModal clients={clients} onClose={()=>setShowAddTask(false)} onSave={t=>{setTasks(ts=>[...ts,{...t,id:uid(),done:false}]);setShowAddTask(false);}}/>}
          {editTask&&<MTaskModal clients={clients} task={editTask} isEdit onClose={()=>setEditTask(null)} onSave={t=>{setTasks(ts=>ts.map(x=>x.id===t.id?t:x));setEditTask(null);}}/>}
          {showAddRenewal&&<MRenewalModal clients={clients} onClose={()=>setShowAddRenewal(false)} onSave={r=>{setRenewals(rs=>[...rs,{...r,id:uid(),status:"upcoming"}]);setShowAddRenewal(false);}}/>}
          {showAddClient&&<MClientModal onClose={()=>setShowAddClient(false)} onSave={c=>{setClients(cs=>[...cs,{...c,id:uid()}]);setShowAddClient(false);}}/>}

          {/* FAB */}
          {!aiOpen&&(view==="tasks"||view==="renewals"||view==="clients")&&(
            <button onClick={()=>{if(view==="tasks")setShowAddTask(true);else if(view==="renewals")setShowAddRenewal(true);else setShowAddClient(true);}}
              style={{position:"fixed",bottom:82,right:18,width:52,height:52,borderRadius:16,background:"#e8c858",color:"#0d0d10",fontSize:26,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(232,200,88,.35)",zIndex:40}}>+</button>
          )}
        </div>
      );
    }

    // ─── Sub-components ─────────────────────────────────────────────────────────
    function MTaskRow({task,clients,onToggle,onDelete,onEdit}){
      const cat=CATEGORIES[task.category]||CATEGORIES.admin;
      const pri=PRIORITIES[task.priority]||PRIORITIES.medium;
      const d=daysUntil(task.dueDate);
      const dl=dayLabel(d);
      const cl=clients.find(c=>c.id===task.clientId);
      return(
        <div className="card-sm" style={{display:"flex",alignItems:"flex-start",gap:10,opacity:task.done?.4:1}}>
          <div className={`cb${task.done?" on":""}`} style={{marginTop:2}} onClick={()=>onToggle(task.id)}>
            {task.done&&<span style={{fontSize:10,color:"#0d0d10",fontWeight:900}}>✓</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:14.5,color:task.done?"#444":"#dcd8f4",textDecoration:task.done?"line-through":"none",marginBottom:5,lineHeight:1.3}}>{task.title}</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:5}}>
              <span className="pill" style={{background:cat.bg,color:cat.color}}>{cat.icon} {cat.label}</span>
              <span className="pill" style={{background:"#1a1014",color:pri.color}}>● {pri.label}</span>
            </div>
            <div style={{fontSize:12.5,color:"#555",display:"flex",gap:8,flexWrap:"wrap"}}>
              <span>📅 {fmtDate(task.dueDate)}{task.time?` · ${task.time}`:""}</span>
              {cl&&<span>👤 {cl.name}</span>}
              {!task.done&&<span style={{color:dl.color,fontWeight:600}}>{dl.text}</span>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
            <button className="btn btn-ghost btn-sm" style={{padding:"5px 9px",fontSize:12}} onClick={()=>onEdit(task)}>✏️</button>
            <button className="btn btn-red btn-sm" style={{padding:"5px 9px",fontSize:12}} onClick={()=>onDelete(task.id)}>✕</button>
          </div>
        </div>
      );
    }

    function MTaskModal({clients,task,onClose,onSave,isEdit}){
      const [f,setF]=useState(task||{title:"",category:"tax",priority:"medium",dueDate:"",time:"",clientId:"",notes:""});
      const s=(k,v)=>setF(x=>({...x,[k]:v}));
      return(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal">
            <div className="modal-header">
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20}}>{isEdit?"Edit Task":"New Task"}</h2>
              <button className="btn btn-ghost btn-sm" style={{padding:"5px 11px"}} onClick={onClose}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div><div className="lbl">Title *</div><input className="input" value={f.title} onChange={e=>s("title",e.target.value)} placeholder="Task title…"/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div className="lbl">Category</div><select className="select" value={f.category} onChange={e=>s("category",e.target.value)}>{Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</select></div>
                <div><div className="lbl">Priority</div><select className="select" value={f.priority} onChange={e=>s("priority",e.target.value)}>{Object.entries(PRIORITIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div className="lbl">Due Date *</div><input className="input" type="date" value={f.dueDate} onChange={e=>s("dueDate",e.target.value)}/></div>
                <div><div className="lbl">Time</div><input className="input" type="time" value={f.time} onChange={e=>s("time",e.target.value)}/></div>
              </div>
              <div><div className="lbl">Client</div><select className="select" value={f.clientId} onChange={e=>s("clientId",e.target.value)}><option value="">— None —</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
              <div><div className="lbl">Notes</div><textarea className="input" value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Details…"/></div>
            </div>
            <div style={{display:"flex",gap:9,marginTop:18}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn btn-gold" style={{flex:2}} onClick={()=>f.title&&f.dueDate&&onSave(f)}>{isEdit?"Save Changes":"Add Task"}</button>
            </div>
          </div>
        </div>
      );
    }

    function MRenewalModal({clients,onClose,onSave}){
      const [f,setF]=useState({clientId:"",service:"",cost:"",billingAmount:"",renewalDate:"",notes:""});
      const s=(k,v)=>setF(x=>({...x,[k]:v}));
      const profit=(parseFloat(f.billingAmount)||0)-(parseFloat(f.cost)||0);
      return(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal">
            <div className="modal-header">
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20}}>New Renewal</h2>
              <button className="btn btn-ghost btn-sm" style={{padding:"5px 11px"}} onClick={onClose}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div><div className="lbl">Client *</div><select className="select" value={f.clientId} onChange={e=>s("clientId",e.target.value)}><option value="">— Select —</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
              <div><div className="lbl">Service *</div><input className="input" value={f.service} onChange={e=>s("service",e.target.value)} placeholder="e.g. GoDaddy Email Hosting"/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div className="lbl">Your Cost (RM)</div><input className="input" type="number" value={f.cost} onChange={e=>s("cost",e.target.value)}/></div>
                <div><div className="lbl">Bill Client (RM)</div><input className="input" type="number" value={f.billingAmount} onChange={e=>s("billingAmount",e.target.value)}/></div>
              </div>
              {f.billingAmount&&<div style={{background:"#08080d",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#57ff9c"}}>Profit: <strong>RM {profit.toFixed(2)}</strong></div>}
              <div><div className="lbl">Renewal Date *</div><input className="input" type="date" value={f.renewalDate} onChange={e=>s("renewalDate",e.target.value)}/></div>
              <div><div className="lbl">Notes</div><input className="input" value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="e.g. 5 licenses"/></div>
            </div>
            <div style={{display:"flex",gap:9,marginTop:18}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn btn-gold" style={{flex:2}} onClick={()=>f.clientId&&f.service&&f.renewalDate&&onSave({...f,cost:parseFloat(f.cost)||0,billingAmount:parseFloat(f.billingAmount)||0})}>Add Renewal</button>
            </div>
          </div>
        </div>
      );
    }

    function MClientModal({onClose,onSave}){
      const [f,setF]=useState({name:"",email:"",type:"tax"});
      const s=(k,v)=>setF(x=>({...x,[k]:v}));
      return(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal">
            <div className="modal-header">
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20}}>New Client</h2>
              <button className="btn btn-ghost btn-sm" style={{padding:"5px 11px"}} onClick={onClose}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div><div className="lbl">Name *</div><input className="input" value={f.name} onChange={e=>s("name",e.target.value)} placeholder="Client or company name"/></div>
              <div><div className="lbl">Email</div><input className="input" type="email" value={f.email} onChange={e=>s("email",e.target.value)} placeholder="email@example.com"/></div>
              <div><div className="lbl">Type</div><select className="select" value={f.type} onChange={e=>s("type",e.target.value)}><option value="tax">📋 Tax Client</option><option value="web">🌐 Web Client</option></select></div>
            </div>
            <div style={{display:"flex",gap:9,marginTop:18}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn btn-gold" style={{flex:2}} onClick={()=>f.name&&onSave(f)}>Add Client</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Register Service Worker & Mount ────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
          .then(reg => console.log("SW registered:", reg.scope))
          .catch(err => console.log("SW failed:", err));
      });
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
