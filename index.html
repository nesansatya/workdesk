// ─── Helpers ─────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const fmtDate = s => s ? new Date(s+"T00:00:00").toLocaleDateString("en-MY",{day:"numeric",month:"short"}) : "";
const fmtDateFull = s => s ? new Date(s+"T00:00:00").toLocaleDateString("en-MY",{day:"numeric",month:"short",year:"numeric"}) : "";
function daysUntil(s){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(s+"T00:00:00")-t)/86400000);}
function dayLabel(d){
  if(d<0)  return{text:`${Math.abs(d)}d overdue`,color:"#FF5757"};
  if(d===0)return{text:"Today",color:"#FF5757"};
  if(d===1)return{text:"Tomorrow",color:"#FFB547"};
  if(d<=7) return{text:`${d}d left`,color:"#FFB547"};
  if(d<=30)return{text:`${d}d left`,color:"#57FF9C"};
  return{text:`${d}d left`,color:"#666"};
}

// ─── AI ──────────────────────────────────────────────────────────────────────
async function callClaude(messages,system=""){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,system,messages}),
  });
  if(!res.ok)throw new Error("API error");
  const data=await res.json();
  return data.content?.map(b=>b.text||"").join("")||"No response.";
}
function buildSystemPrompt(tasks,clients,renewals,workflow,settings){
  const today=new Date().toISOString().split("T")[0];
  const wf=WORKFLOW_FIELDS.filter(f=>workflow[f.key]?.trim()).map(f=>`${f.icon} ${f.label}:\n${workflow[f.key]}`).join("\n\n");
  return `You are a personalised AI work assistant${settings?.name?" for "+settings.name:""} ${settings?.company?"at "+settings.company+",":","} a Malaysian Senior Tax Executive who also runs a web design side business.
TODAY: ${today}
WORKFLOW PROFILE:\n${wf||"Not set yet."}
CLIENTS:\n${clients.map(c=>`• ${c.name} (${c.type==="tax"?"Tax":"Web"}, ${c.email})`).join("\n")}
PENDING TASKS:\n${tasks.filter(t=>!t.done).map(t=>{const c=clients.find(x=>x.id===t.clientId);const d=daysUntil(t.dueDate);return`• [${t.priority.toUpperCase()}] ${t.title} | ${t.dueDate} (${d>=0?d+"d left":Math.abs(d)+"d OVERDUE"}) | ${t.category}${c?" | "+c.name:""}`;}).join("\n")}
RENEWALS:\n${renewals.filter(r=>r.status!=="done").map(r=>{const c=clients.find(x=>x.id===r.clientId);const d=daysUntil(r.renewalDate);return`• ${r.service} for ${c?.name||"?"} | ${r.renewalDate} (${d}d) | Bill: RM${r.billingAmount} | Profit: RM${r.billingAmount-r.cost}`;}).join("\n")}
Office hours: 9am–6pm, lunch 1–2pm. Currency: RM. Be concise and practical.`;
}

// ─── CSS ─────────────────────────────────────────────────────────────────────
const CSS = `
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
:root{
  --bg:#09090e; --bg2:#111118; --bg3:#161620;

  --radius:12px; --radius-lg:16px;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px;}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;height:calc(var(--vh,1vh)*100);width:100%;max-width:100%;background:var(--bg);color:var(--text);font-family:'DM Sans','Segoe UI',sans-serif;overflow:hidden;position:relative;overscroll-behavior:none;}

.sidebar-logo-text{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);}
.sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:none;background:none;color:var(--text2);font-size:14px;font-weight:500;font-family:inherit;width:100%;text-align:left;transition:all .18s;}
.sidebar-item:hover{background:var(--bg3);color:var(--text);}
.sidebar-item.active{background:linear-gradient(135deg,#1a1828,#12101e);color:var(--gold);border:1px solid #28243a;}
.sidebar-item .nav-icon{font-size:17px;flex-shrink:0;}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border);}
.sidebar-time{font-size:12px;color:var(--text3);padding:8px 12px;background:var(--bg2);border-radius:8px;text-align:center;}
.sidebar-ai-btn{width:100%;margin-top:8px;background:linear-gradient(135deg,#1c1440,#0e2840);color:var(--ai-light);border:1px solid #2c2060;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.sidebar-ai-btn:hover{background:linear-gradient(135deg,#221850,#102e50);}

/* ── DESKTOP MAIN ── */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.desktop-topbar{flex-shrink:0;height:56px;padding:0 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
.desktop-topbar-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);}
.desktop-content{flex:1;overflow-y:auto;padding:24px;overscroll-behavior-y:contain;will-change:scroll-position;}

/* ── MOBILE LAYOUT ── */
.mobile-topbar{display:none;flex-shrink:0;min-height:54px;height:auto;padding:max(env(safe-area-inset-top),8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;z-index:10;}
.mobile-scroll{display:none;flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;will-change:scroll-position;padding:14px 16px 110px 16px;width:100%;max-width:100%;box-sizing:border-box;overflow-x:hidden;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d16;border-top:1px solid var(--border);padding:0 4px;padding-bottom:max(env(safe-area-inset-bottom),16px);z-index:50;min-height:60px;}

@media (max-width: 768px) {
  .app{flex-direction:column !important;}

  .mobile-scroll{display:block !important;overflow-x:hidden !important;width:100% !important;}

  .mobile-scroll{display:none !important;}
  .bottom-nav{display:none !important;}
  .sidebar{display:flex !important;}
  .main-area{display:flex !important;}

@keyframes blink{0%,80%,100%{opacity:.15;}40%{opacity:1;}}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:769px){.modal-bg{align-items:center;}}
.modal{background:#111118;border:1px solid #20203a;width:100%;max-height:94dvh;overflow-y:auto;padding:22px 18px;padding-bottom:calc(22px + env(safe-area-inset-bottom));}
.modal-border-mobile{border-radius:20px 20px 0 0;}
@media(min-width:769px){
  .modal{max-width:520px;border-radius:16px;padding:26px 24px;max-height:90vh;}
  .modal-border-mobile{border-radius:16px;}
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}

/* ── CHIPS ── */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.chip{flex-shrink:0;border:1px solid #1e1e2c;border-radius:20px;padding:6px 13px;font-size:12px;font-weight:500;color:var(--text3);background:none;cursor:pointer;white-space:nowrap;font-family:inherit;}
.chip.active{border-color:var(--gold);color:var(--gold);background:#1a1a28;}

/* ── RENEWAL COLS ── */
.ren-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0;}
.ren-col{background:#08080d;border-radius:8px;padding:7px 8px;}

/* ── WORKFLOW ── */
.wf-card{background:#0e0e18;border:1px solid #1a1a2a;border-radius:12px;padding:14px;margin-bottom:8px;}
.wf-card.filled{border-color:#1e2e1e;}
.wf-bar-bg{height:5px;background:#1a1a28;border-radius:5px;overflow:hidden;margin:8px 0;}
.wf-bar{height:100%;border-radius:5px;transition:width .4s;}

/* ── OFFLINE BANNER ── */
.offline-banner{background:#1a1008;border-bottom:1px solid #2a1808;padding:5px 16px;font-size:12px;color:#e8a838;text-align:center;font-weight:600;flex-shrink:0;}

/* ── FAB ── */



/* ── DESKTOP PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;width:100%;box-sizing:border-box;overflow:hidden;}
.fab{position:fixed;bottom:calc(max(env(safe-area-inset-bottom),16px) + 68px);right:16px;background:#e8c858;color:#0d0d10;border:none;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;z-index:40;opacity:0;pointer-events:none;transition:opacity .3s ease;font-family:inherit;}.fab.fab-visible{opacity:0.75;pointer-events:all;}
@media(min-width:769px){.fab{display:none;}}
.page-title{font-family:'Playfair Display',serif;font-size:24px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}

/* ── QA GRID ── */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.qa-btn{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:border-color .2s;-webkit-tap-highlight-color:transparent;}
.qa-btn:hover,.qa-btn:active{border-color:var(--gold);}
.qa-btn .qa-icon{font-size:22px;}
.qa-btn .qa-label{font-size:12px;font-weight:600;color:var(--text2);}
`;

// ─── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const load=(k,d)=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):d;}catch{return d;}};
  const [tasks,    setTasks]    = useState(()=>load("wd_tasks",   DEFAULT_TASKS));
  const [clients,  setClients]  = useState(()=>load("wd_clients", DEFAULT_CLIENTS));
  const [renewals, setRenewals] = useState(()=>load("wd_renewals",DEFAULT_RENEWALS));
  const [workflow, setWorkflow] = useState(()=>load("wd_workflow",DEFAULT_WORKFLOW));
  const [view, setView] = useState(()=>localStorage.getItem("wd_view")||"home");
  const changeView = v => { setView(v); localStorage.setItem("wd_view", v); };
  const [now,        setNow]        = useState(new Date());
  const [filterCat,  setFilterCat]  = useState("all");
  const [isOnline,   setIsOnline]   = useState(navigator.onLine);
  const [showAddTask,    setShowAddTask]    = useState(false);
  const [showAddRenewal, setShowAddRenewal] = useState(false);
  const [editRenewal, setEditRenewal] = useState(null);
  const [renTab, setRenTab] = useState('active');
  const [showAddClient,  setShowAddClient]  = useState(false);
  const [editTask,       setEditTask]       = useState(null);
  const [editClient,     setEditClient]     = useState(null);
  const [aiOpen,      setAiOpen]    = useState(false);
  const [aiTab,       setAiTab]     = useState("chat");
  const [chatHistory, setChatHistory] = useState(()=>load("wd_chat",[{role:"assistant",content:"Hi! I'm your AI assistant. Ask me anything about your tasks, clients, or deadlines. 👋"}]));
  const [chatInput,   setChatInput] = useState("");
  const [aiLoading,   setAiLoading] = useState(false);
  const [briefing,    setBriefing]  = useState("");
  const [emailDraft,  setEmailDraft]= useState("");
  const [emailCtx,    setEmailCtx]  = useState({clientId:"",purpose:""});
  const [suggestions, setSuggestions] = useState([]);
  const [wfEdits,    setWfEdits]   = useState({});
  const [wfSaved,    setWfSaved]   = useState(false);
  const [wfExpanded, setWfExpanded]= useState(null);
  const chatEndRef = useRef(null);
  const [searchQ,     setSearchQ]    = useState("");
  const [bulkMode,    setBulkMode]   = useState(false);
  const [bulkSel,     setBulkSel]    = useState([]);
  const [renSort,     setRenSort]    = useState("date");
  const [clientDetail,setClientDetail]= useState(null);
  const [darkMode,    setDarkMode]   = useState(()=>load("wd_darkmode",true));
  const [settings,    setSettings]   = useState(()=>load("wd_settings",{name:"",company:"",currency:"RM"}));
  const [showSettings,setShowSettings]= useState(false);
  const [notifGranted,setNotifGranted]= useState(false);

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);
  useEffect(()=>{
    const on=()=>setIsOnline(true),off=()=>setIsOnline(false);
    window.addEventListener("online",on);window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);
  useEffect(()=>{try{localStorage.setItem("wd_tasks",   JSON.stringify(tasks));}catch{}},[tasks]);
  useEffect(()=>{try{localStorage.setItem("wd_clients", JSON.stringify(clients));}catch{}},[clients]);
  useEffect(()=>{try{localStorage.setItem("wd_renewals",JSON.stringify(renewals));}catch{}},[renewals]);
  useEffect(()=>{try{localStorage.setItem("wd_workflow",JSON.stringify(workflow));}catch{}},[workflow]);
  useEffect(()=>{try{localStorage.setItem("wd_darkmode",JSON.stringify(darkMode));}catch{}},[darkMode]);
  useEffect(()=>{try{localStorage.setItem("wd_settings",JSON.stringify(settings));}catch{}},[settings]);

  // Notification: check renewals + daily briefing
  useEffect(()=>{
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    const lastNotif=localStorage.getItem("wd_last_notif");
    const todayStr=new Date().toISOString().split("T")[0];
    if(lastNotif===todayStr)return;
    localStorage.setItem("wd_last_notif",todayStr);
    // Renewal reminders
    const urgent=renewals.filter(r=>r.status!=="done"&&daysUntil(r.renewalDate)<=7&&daysUntil(r.renewalDate)>=0);
    urgent.forEach(r=>{
      const cl=clients.find(c=>c.id===r.clientId);
      const d=daysUntil(r.renewalDate);
      setTimeout(()=>{
        new Notification("⚠️ Renewal Due Soon",{
          body:`${r.service}${cl?" — "+cl.name:""} expires in ${d===0?"today":d+"d"} · RM ${r.billingAmount}`,
          icon:"/workdesk/icons/icon-192.png"
        });
      },2000);
    });
    // Daily briefing at 9am (show if between 9-10am)
    const h=new Date().getHours();
    if(h>=9&&h<10){
      const pending=tasks.filter(t=>!t.done).length;
      const overdue=tasks.filter(t=>!t.done&&t.dueDate<todayStr).length;
      setTimeout(()=>{
        new Notification("☀️ Good morning — WorkDesk",{
          body:`${pending} tasks pending${overdue>0?`, ${overdue} overdue`:""}.${urgent.length>0?` ${urgent.length} renewal${urgent.length>1?"s":""} expiring soon.`:""}`,
          icon:"/workdesk/icons/icon-192.png"
        });
      },3000);
    }
    setNotifGranted(Notification.permission==="granted");
  },[]);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[chatHistory,aiLoading]);
  useEffect(()=>{try{localStorage.setItem("wd_chat",JSON.stringify(chatHistory.slice(-40)));}catch{}},[chatHistory]);

  const today   = now.toISOString().split("T")[0];
  const hour    = now.getHours();
  const isOffice= hour>=9&&hour<18, isLunch=hour>=13&&hour<14;
  const greet   = hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
  const todayTasks    = tasks.filter(t=>t.dueDate===today&&!t.done);
  const overdueTasks  = tasks.filter(t=>t.dueDate<today&&!t.done);
  const upcomingTasks = tasks.filter(t=>t.dueDate>today&&!t.done).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const urgentRenewals= renewals.filter(r=>daysUntil(r.renewalDate)<=30&&r.status!=="done");
  const wfFilled = WORKFLOW_FIELDS.filter(f=>workflow[f.key]?.trim()).length;
  const wfPct    = Math.round((wfFilled/WORKFLOW_FIELDS.length)*100);
  const toggleDone  = id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteTask  = id=>setTasks(ts=>ts.filter(t=>t.id!==id));
  const markRenDone   = id=>setRenewals(rs=>rs.map(r=>r.id===id?{...r,status:"done"}:r));
  const unmarkRenDone = id=>setRenewals(rs=>rs.map(r=>r.id===id?{...r,status:"upcoming"}:r));
  const archiveRenewal = id=>setRenewals(rs=>rs.map(r=>r.id===id?{...r,status:"archived"}:r));
  const deleteRenewal = id=>{ if(window.confirm("Permanently delete this renewal?")) setRenewals(rs=>rs.filter(r=>r.id!==id)); };
  const saveEditRenewal = (id,data)=>{ setRenewals(rs=>rs.map(r=>r.id===id?{...r,...data}:r)); setEditRenewal(null); };
  const bulkComplete = ()=>{ setTasks(ts=>ts.map(t=>bulkSel.includes(t.id)?{...t,done:true}:t)); setBulkSel([]); setBulkMode(false); };
  const toggleBulkSel = id=>setBulkSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const deleteClient = id=>{ if(window.confirm("Delete this client? Their tasks and renewals will stay but become unlinked.")) setClients(cs=>cs.filter(c=>c.id!==id)); };
  const sys = buildSystemPrompt(tasks,clients,renewals,workflow,settings);
  const saveWorkflow=()=>{setWorkflow(w=>({...w,...wfEdits}));setWfEdits({});setWfSaved(true);setTimeout(()=>setWfSaved(false),2200);};
  const filteredTasks=tasks.filter(t=>{
    const q=searchQ.toLowerCase();
    if(q&&!t.title.toLowerCase().includes(q)&&!t.notes?.toLowerCase().includes(q))return false;
    if(filterCat==="all")return true;
    if(filterCat==="done")return t.done;
    return t.category===filterCat&&!t.done;
  }).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return a.dueDate.localeCompare(b.dueDate);});

  // AI actions
  const sendChat=async()=>{
    if(!chatInput.trim()||aiLoading)return;
    if(!isOnline){setChatHistory(h=>[...h,{role:"user",content:chatInput},{role:"assistant",content:"⚠️ You're offline. AI needs internet."}]);setChatInput("");return;}
    const userMsg={role:"user",content:chatInput.trim()};
    const newHist=[...chatHistory,userMsg];
    setChatHistory(newHist);setChatInput("");setAiLoading(true);
    try{const r=await callClaude(newHist.map(m=>({role:m.role,content:m.content})),sys);setChatHistory(h=>[...h,{role:"assistant",content:r}]);}
    catch{setChatHistory(h=>[...h,{role:"assistant",content:"Connection error. Try again."}]);}
    setAiLoading(false);
  };
  const genBriefing=async()=>{
    if(!isOnline){setBriefing("⚠️ Offline.");return;}
    setAiLoading(true);setBriefing("");
    try{const r=await callClaude([{role:"user",content:`Generate my personalised daily briefing for today (${today}). Priority actions, overdue items, renewals, time-blocked schedule 9am–6pm (skip 1–2pm lunch).`}],sys);setBriefing(r);}
    catch{setBriefing("Failed. Try again.");}setAiLoading(false);
  };
  const genEmail=async()=>{
    if(!emailCtx.clientId||!emailCtx.purpose)return;
    if(!isOnline){setEmailDraft("⚠️ Offline.");return;}
    const cl=clients.find(c=>c.id===emailCtx.clientId);
    setAiLoading(true);setEmailDraft("");
    try{const r=await callClaude([{role:"user",content:`Draft a professional email to ${cl.name} (${cl.email}) for: "${emailCtx.purpose}". Match my communication style. Include subject line.`}],sys);setEmailDraft(r);}
    catch{setEmailDraft("Connection error.");}setAiLoading(false);
  };
  const genSuggestions=async()=>{
    if(!isOnline)return;
    setAiLoading(true);setSuggestions([]);
    try{const r=await callClaude([{role:"user",content:`Suggest 5 tasks based on my workflow routines. Return ONLY JSON array: [{"title":"...","category":"tax|web|social|billing|admin","priority":"high|medium|low","dueDate":"YYYY-MM-DD","notes":"...","reason":"..."}]. Today is ${today}.`}],sys);
      setSuggestions(JSON.parse(r.replace(/```json|```/g,"").trim()));}
    catch{setSuggestions([]);}setAiLoading(false);
  };
  const addSuggested=s=>{setTasks(ts=>[...ts,{...s,id:uid(),done:false,clientId:"",time:""}]);setSuggestions(ss=>ss.filter(x=>x!==s));};
  const openAI=(tab,cb)=>{setAiOpen(true);setAiTab(tab);if(cb)cb();};

  // PAGE CONTENT — shared between mobile and desktop
  const pageContent = (
    <div>
      {/* ═══ HOME ═══ */}
      {view==="home"&&(
        <div>
          <div style={{marginBottom:20}}>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(22px,4vw,28px)",letterSpacing:"-.01em"}}>{greet} 👋</h1>
            <p style={{color:"var(--text3)",fontSize:13,marginTop:4}}>{now.toLocaleDateString("en-MY",{weekday:"long",day:"numeric",month:"long"})}</p>
          </div>
          <div className="stat-grid">
            {[
              {label:"Today",v:todayTasks.length,c:"var(--gold)",i:"📅"},
              {label:"Overdue",v:overdueTasks.length,c:"var(--red)",i:"⚠️"},
              {label:"Renewals <30d",v:urgentRenewals.length,c:"var(--blue)",i:"🔄"},
              {label:"Pending",v:tasks.filter(t=>!t.done).length,c:"#a8e838",i:"📋"},
            ].map(s=>(
              <div key={s.label} className="stat-card">
                <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
                <div style={{fontSize:28,fontWeight:700,color:s.c,fontFamily:"'Playfair Display',serif"}}>{s.v}</div>
                <div style={{fontSize:11.5,color:"var(--text3)",marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* AI Quick actions */}
          <div style={{background:"linear-gradient(135deg,#0d0c1e,#080e18)",border:"1px solid #181830",borderRadius:14,padding:"12px 14px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
              <span style={{background:"linear-gradient(135deg,#2a1f5a,#1a3a5a)",border:"1px solid #3a2a7a",borderRadius:12,padding:"2px 8px",fontSize:10,color:"#a090ff",fontWeight:700}}>✦ AI</span>
              <span style={{fontSize:12,color:isOnline?"var(--text3)":"#6b5010"}}>{isOnline?"Personalised for your workflow":"Offline — AI paused"}</span>
            </div>
            <div className="qa-grid">
              <button className="qa-btn" onClick={()=>openAI("briefing",genBriefing)}><span className="qa-icon">📋</span><span className="qa-label">Daily Brief</span></button>
              <button className="qa-btn" onClick={()=>openAI("suggest",genSuggestions)}><span className="qa-icon">💡</span><span className="qa-label">Suggest Tasks</span></button>
              <button className="qa-btn" onClick={()=>openAI("email",null)}><span className="qa-icon">✉️</span><span className="qa-label">Draft Email</span></button>
              <button className="qa-btn" onClick={()=>openAI("chat",null)}><span className="qa-icon">💬</span><span className="qa-label">Ask AI</span></button>
            </div>
          </div>

          <div className="dash-grid">
            <div>
              {overdueTasks.length>0&&(
                <div style={{marginBottom:16}}>
                  <div className="sec-head"><div className="sec-bar" style={{background:"var(--red)"}}/><span className="sec-title" style={{color:"#ff8080"}}>Overdue ({overdueTasks.length})</span></div>
                  {overdueTasks.slice(0,4).map(t=><TaskRow key={t.id} task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/>)}
                </div>
              )}
              <div className="sec-head"><div className="sec-bar" style={{background:"var(--gold)"}}/><span className="sec-title">Today — {now.toLocaleDateString("en-MY",{day:"numeric",month:"short"})}</span></div>
              {todayTasks.length===0
                ?<div style={{color:"#444",fontSize:13,padding:"10px 0"}}>No tasks due today ✅</div>
                :todayTasks.map(t=><TaskRow key={t.id} task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/>)}
              {upcomingTasks.length>0&&(
                <div style={{marginTop:16}}>
                  <div className="sec-head"><div className="sec-bar" style={{background:"var(--blue)"}}/><span className="sec-title">Coming Up</span></div>
                  {upcomingTasks.slice(0,4).map(t=><TaskRow key={t.id} task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/>)}
                </div>
              )}
            </div>
            <div>
              {urgentRenewals.length>0&&(
                <div>
                  <div className="sec-head"><div className="sec-bar" style={{background:"var(--blue)"}}/><span className="sec-title">Renewal Alerts</span></div>
                  {urgentRenewals.slice(0,4).map(r=>{
                    const cl=clients.find(c=>c.id===r.clientId);
                    const dl=dayLabel(daysUntil(r.renewalDate));
                    return(
                      <div key={r.id} className="card-sm" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:13.5,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.service}</div>
                          <div style={{fontSize:12,color:"var(--text3)"}}>{cl?.name} · <span style={{color:"var(--green)",fontWeight:600}}>RM {r.billingAmount}</span></div>
                        </div>
                        <span style={{fontSize:12,fontWeight:700,color:dl.color,flexShrink:0,marginLeft:8}}>{dl.text}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ═══ TASKS ═══ */}
      {view==="tasks"&&(
        <div>
          <div className="page-header">
            <h1 className="page-title">Tasks</h1>
            <div style={{display:"flex",gap:6}}>
              <button className="btn btn-ghost btn-sm" style={{fontSize:12,padding:"6px 10px",color:bulkMode?"var(--gold)":"var(--text3)"}} onClick={()=>{setBulkMode(b=>!b);setBulkSel([]);}}>☑ Bulk</button>
              <button className="btn btn-ai btn-sm" onClick={()=>openAI("suggest",genSuggestions)}>✦ AI</button>
              <button className="btn btn-gold btn-sm" onClick={()=>setShowAddTask(true)}>+ Add</button>
            </div>
          </div>
          {bulkMode&&bulkSel.length>0&&(
            <div style={{display:"flex",gap:8,marginBottom:10,padding:"10px 12px",background:"#0e1a0e",borderRadius:10,border:"1px solid #1a2e1a",alignItems:"center"}}>
              <span style={{flex:1,fontSize:13,color:"var(--green)"}}>{bulkSel.length} selected</span>
              <button className="btn btn-ghost btn-sm" style={{color:"var(--green)",borderColor:"#1a2e1a"}} onClick={bulkComplete}>✓ Mark all done</button>
              <button className="btn btn-ghost btn-sm" style={{color:"var(--text3)"}} onClick={()=>{setBulkSel([]);setBulkMode(false);}}>Cancel</button>
            </div>
          )}
          <div style={{marginBottom:12}}>
            <input className="input" style={{fontSize:13}} placeholder="Search tasks…" value={searchQ} onChange={e=>setSearchQ(e.target.value)}/>
          </div>
          <div className="chips">
            {[["all","All"],["done","Done ✓"],["tax","📋 Tax"],["web","🌐 Web"],["social","📱 Social"],["billing","💰 Billing"],["admin","📁 Admin"]].map(([k,l])=>(
              <button key={k} className={`chip${filterCat===k?" active":""}`} onClick={()=>setFilterCat(k)}>{l}</button>
            ))}
          </div>
          {filteredTasks.length===0
            ?<div style={{color:"#444",fontSize:14,padding:"24px 0",textAlign:"center"}}>No tasks here.</div>
            :filteredTasks.map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:8}}>
                {bulkMode&&<div onClick={()=>toggleBulkSel(t.id)} style={{width:20,height:20,borderRadius:6,border:"2px solid",borderColor:bulkSel.includes(t.id)?"var(--green)":"var(--border)",background:bulkSel.includes(t.id)?"var(--green)":"transparent",flexShrink:0,marginTop:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#0d0d10",fontWeight:900}}>{bulkSel.includes(t.id)?"✓":""}</div>}
                <div style={{flex:1}}><TaskRow task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/></div>
              </div>
            ))}
        </div>
      )}

      {/* ═══ RENEWALS ═══ */}
      {view==="renewals"&&(
        <div>
          <div className="page-header">
            <h1 className="page-title">Renewals</h1>
            <button className="btn btn-gold btn-sm" onClick={()=>setShowAddRenewal(true)}>+ Add</button>
          </div>
          {/* Profit summary */}
          {renTab==="active"&&(()=>{
const activeRens=renewals.filter(r=>r.status!=="done"&&r.status!=="archived");
            const totalProfit=activeRens.reduce((a,r)=>a+(r.billingAmount-r.cost),0);
            const totalBilling=activeRens.reduce((a,r)=>a+r.billingAmount,0);
            return activeRens.length>0?(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                <div style={{background:"#0a120a",border:"1px solid #1a2e1a",borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontSize:11,color:"var(--text3)",marginBottom:3}}>Total Billing</div>
                  <div style={{fontSize:17,fontWeight:700,color:"var(--green)"}}>RM {totalBilling}</div>
                </div>
                <div style={{background:"#120a08",border:"1px solid #2e1a10",borderRadius:10,padding:"10px 12px"}}>

                  <div style={{fontSize:17,fontWeight:700,color:"var(--gold)"}}>RM {totalProfit}</div>
                </div>

          {/* Search + sort */}
          <div style={{display:"flex",gap:8,marginBottom:10}}>

            <select className="select" style={{width:"auto",fontSize:12,padding:"8px 10px"}} value={renSort} onChange={e=>setRenSort(e.target.value)}>
              <option value="date">By date</option>
              <option value="profit">By profit</option>
              <option value="billing">By billing</option>
              <option value="client">By client</option>
            </select>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",gap:8,marginBottom:14,paddingBottom:12,borderBottom:"1px solid #1e1e2e"}}>
            {[["active","Active"],["done","Done ✓"],["archived","🗄 Archive"]].map(([k,lbl])=>(
              <button key={k} onClick={()=>setRenTab(k)} style={{padding:"7px 18px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",border:"none",background:renTab===k?"var(--gold)":k==="done"&&renewals.filter(r=>r.status==="done").length>0?"#0e1a0e":"var(--bg2)",color:renTab===k?"#0d0d10":k==="done"&&renewals.filter(r=>r.status==="done").length>0?"var(--green)":"var(--text3)"}}>
  {lbl}{k==="done"&&renewals.filter(r=>r.status==="done").length>0?` (${renewals.filter(r=>r.status==="done").length})`:""}{k==="archived"&&renewals.filter(r=>r.status==="archived").length>0?` (${renewals.filter(r=>r.status==="archived").length})`:""}
              </button>
            ))}
          </div>
          <div className="renewals-grid">
            {renewals
              .filter(r=>{
                const q=searchQ.toLowerCase();
                if(q&&!r.service.toLowerCase().includes(q)&&!(clients.find(c=>c.id===r.clientId)?.name||"").toLowerCase().includes(q))return false;
                if(renTab==="active")return r.status!=="done"&&r.status!=="archived";
                if(renTab==="done")return r.status==="done";
                return r.status==="archived";
              })
              .sort((a,b)=>{
                if(renSort==="profit")return (b.billingAmount-b.cost)-(a.billingAmount-a.cost);
                if(renSort==="billing")return b.billingAmount-a.billingAmount;
                if(renSort==="client"){const ca=clients.find(c=>c.id===a.clientId)?.name||"";const cb=clients.find(c=>c.id===b.clientId)?.name||"";return ca.localeCompare(cb);}
                return a.renewalDate.localeCompare(b.renewalDate);
              })
              .map(r=>{
                const cl=clients.find(c=>c.id===r.clientId);
                const d=daysUntil(r.renewalDate);
                const dl=dayLabel(d);
                const done=r.status==="done";
                return(
                  <div key={r.id} className="card" style={{opacity:done?.5:1,borderColor:d<=7&&!done?"#2e1a1a":"var(--border)",marginBottom:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{flex:1,minWidth:0,marginRight:8}}>
                        <div style={{fontWeight:600,fontSize:15,marginBottom:2,textDecoration:done?"line-through":"none",opacity:done?.6:1}}>{r.service}</div>
                        <div style={{fontSize:13,color:"var(--text3)"}}>{cl?.name}</div>
                      </div>
                      <span style={{fontSize:12,fontWeight:700,color:done?"var(--green)":dl.color,background:"#08080d",padding:"3px 9px",borderRadius:12,flexShrink:0}}>{done?"✓ Done":dl.text}</span>
                    </div>
                    <div className="ren-cols">
                      {[["Cost",`RM ${r.cost}`,"#ff7070"],["Billing",`RM ${r.billingAmount}`,"var(--green)"],["Profit",`RM ${r.billingAmount-r.cost}`,"var(--gold)"]].map(([l,v,c])=>(
                        <div key={l} className="ren-col"><div className="lbl">{l}</div><div style={{fontWeight:700,color:done?"#555":c,fontSize:14}}>{v}</div></div>
                      ))}
                    </div>
                    <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>📅 {fmtDateFull(r.renewalDate)}{r.notes?` · ${r.notes}`:""}</div>
                    {!done&&(
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <button className="btn btn-ai btn-sm" style={{flex:1}} onClick={()=>{openAI("email",null);setEmailCtx({clientId:r.clientId,purpose:`Send renewal invoice for ${r.service}, billing RM${r.billingAmount}`});}}>✦ Email</button>
                        <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>markRenDone(r.id)}>✓ Done</button>
                        <button className="btn btn-ghost btn-sm" style={{padding:"7px 10px",color:"var(--gold)"}} onClick={()=>setEditRenewal(r)}>✏️</button>
                        <button className="btn btn-ghost btn-sm" style={{padding:"7px 10px",color:"#ff6868"}} onClick={()=>deleteRenewal(r.id)}>🗑</button>
                      </div>
                    )}
                    {done&&(
                      <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-ghost btn-sm" style={{flex:1,color:"var(--text3)"}} onClick={()=>unmarkRenDone(r.id)}>↩ Restore</button>
                        <button className="btn btn-ghost btn-sm" style={{padding:"7px 10px",color:"#888",fontSize:11}} onClick={()=>archiveRenewal(r.id)}>🗄 Archive</button>
                      </div>

                    {r.status==="archived"&&(
                      <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-ghost btn-sm" style={{flex:1,color:"var(--text3)"}} onClick={()=>unmarkRenDone(r.id)}>↩ Restore</button>
                        <button className="btn btn-ghost btn-sm" style={{padding:"7px 10px",color:"#ff6868"}} onClick={()=>deleteRenewal(r.id)}>🗑 Delete</button>
                      </div>
                    )}
                  </div>
                );
              })}
            {renewals.filter(r=>renTab==="active"?r.status!=="done":r.status==="done").length===0&&(
              <div style={{gridColumn:"1/-1",textAlign:"center",padding:"40px 0",color:"var(--text3)",fontSize:14}}>
  {renTab==="active"?"No active renewals — tap + Add to create one":renTab==="done"?"No completed renewals yet":"Archive is empty"}
              </div>
            )}
          </div>
        </div>

              const cT=tasks.filter(t=>t.clientId===c.id&&!t.done);
              const cR=renewals.filter(r=>r.clientId===c.id&&r.status!=="done");

                    <div style={{flex:1,minWidth:0}}>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:11}}>

                    <div style={{background:"#08080d",borderRadius:8,padding:"8px 10px"}}><div className="lbl">Renewals</div><div style={{fontWeight:700,color:"var(--blue)"}}>{cR.length}</div></div>
                    <div style={{background:"#08080d",borderRadius:8,padding:"8px 10px"}}><div className="lbl">Billed</div><div style={{fontWeight:700,color:"var(--green)",fontSize:12}}>RM {tot}</div></div>
                  </div>
                  <div style={{display:"flex",gap:7}} onClick={e=>e.stopPropagation()}>
                    <button className="btn btn-ai btn-sm" style={{flex:2}} onClick={()=>{openAI("email",null);setEmailCtx({clientId:c.id,purpose:""});}}>✦ Email</button>
                    <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>setEditClient(c)}>✏️ Edit</button>
                    <button className="btn btn-red btn-sm" style={{flex:1,padding:"7px 8px"}} onClick={()=>deleteClient(c.id)}>🗑</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

        const cRens=renewals.filter(r=>r.clientId===c.id);
        const totalBilled=cRens.reduce((a,r)=>a+r.billingAmount,0);
        const totalProfit=cRens.reduce((a,r)=>a+(r.billingAmount-r.cost),0);
        return(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setClientDetail(null)}>← Back</button>
              <h1 className="page-title" style={{margin:0,flex:1}}>{c.name}</h1>

            <div className="card" style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:48,height:48,borderRadius:14,background:c.type==="tax"?"#2a1f06":"#061a2a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{c.type==="tax"?"📋":"🌐"}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:17}}>{c.name}</div>
                  <div style={{fontSize:13,color:"var(--text3)"}}>{c.email||"No email"}</div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:"#08080d",borderRadius:8,padding:"10px 12px"}}>

                <div style={{background:"#08080d",borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:11,color:"var(--text3)"}}>Total Profit</div>
                  <div style={{fontSize:18,fontWeight:700,color:"var(--gold)"}}>RM {totalProfit}</div>
                </div>
              </div>
              <button className="btn btn-ai btn-full" style={{marginTop:10}} onClick={()=>{openAI("email",null);setEmailCtx({clientId:c.id,purpose:""});}}>✦ Draft Email</button>

            {/* Tasks */}
            <div style={{marginBottom:16}}>
              <div className="sec-head" style={{marginBottom:8}}><div className="sec-bar" style={{background:"var(--gold)"}}/><span className="sec-title">Tasks ({cTasks.filter(t=>!t.done).length} active)</span></div>

              :cTasks.sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).map(t=><TaskRow key={t.id} task={t} clients={clients} onToggle={toggleDone} onDelete={deleteTask} onEdit={setEditTask}/>)}

            <div>

              :cRens.sort((a,b)=>a.renewalDate.localeCompare(b.renewalDate)).map(r=>{
                const d=daysUntil(r.renewalDate);const dl=dayLabel(d);const done=r.status==="done";
                return(
                  <div key={r.id} className="card" style={{opacity:done?.5:1,marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{fontWeight:600,fontSize:14,textDecoration:done?"line-through":"none"}}>{r.service}</div>
                      <span style={{fontSize:12,fontWeight:700,color:done?"var(--green)":dl.color}}>{done?"✓ Done":dl.text}</span>
                    </div>
                    <div className="ren-cols">
                      {[["Cost",`RM ${r.cost}`,"#ff7070"],["Billing",`RM ${r.billingAmount}`,"var(--green)"],["Profit",`RM ${r.billingAmount-r.cost}`,"var(--gold)"]].map(([l,v,c])=>(
                        <div key={l} className="ren-col"><div className="lbl">{l}</div><div style={{fontWeight:700,color:done?"#555":c,fontSize:13}}>{v}</div></div>
                      ))}

                    <div style={{fontSize:12,color:"var(--text3)",marginTop:6}}>📅 {fmtDateFull(r.renewalDate)}{r.notes?` · ${r.notes}`:""}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

          <div className="page-header">

          </div>
          <div className="card" style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:600,color:wfPct>=80?"#60c860":wfPct>=40?"#e8a838":"#c85050"}}>AI Profile {wfPct}% complete</span>
              <span style={{fontSize:12,color:"var(--text3)"}}>{wfFilled}/{WORKFLOW_FIELDS.length} filled</span>
            </div>
            <div className="wf-bar-bg">
              <div className="wf-bar" style={{width:`${wfPct}%`,background:wfPct>=80?"linear-gradient(90deg,#40a840,#60c860)":wfPct>=40?"linear-gradient(90deg,#c88020,#e8a838)":"linear-gradient(90deg,#a82020,#c84040)"}}/>
            </div>
            {Object.keys(wfEdits).length>0&&<button className="btn btn-ghost btn-full btn-sm" style={{marginTop:10,color:"#60d060",borderColor:"#2a3a2a"}} onClick={saveWorkflow}>💾 Save Changes</button>}
            {wfSaved&&Object.keys(wfEdits).length===0&&<div style={{fontSize:12,color:"#60c860",textAlign:"center",marginTop:8}}>✓ Saved!</div>}
          </div>
          {WORKFLOW_FIELDS.map(field=>{

            const isExp=wfExpanded===field.key;
            return(
              <div key={field.key} className={`wf-card${isFilled?" filled":""}`}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setWfExpanded(isExp?null:field.key)}>

                    <span style={{fontSize:18}}>{field.icon}</span>
                    <span style={{fontWeight:600,fontSize:14,color:"#ccc"}}>{field.label}</span>
                    {isFilled&&<span style={{fontSize:10,background:"#0e1e0e",color:"#50a850",border:"1px solid #183018",borderRadius:10,padding:"1px 7px",fontWeight:700}}>✓</span>}

                  </div>

                {!isExp&&isFilled&&<div style={{fontSize:12,color:"var(--text3)",marginTop:6,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{current}</div>}
              </div>
            );
          })}
        </div>

      {/* ═══ SETTINGS ═══ */}

        <div>
          <div className="page-header">
            <h1 className="page-title">⚙️ Settings</h1>
          </div>

            <div style={{fontSize:13,fontWeight:700,color:"var(--gold)",marginBottom:12}}>👤 Profile</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div><div className="lbl">Your Name</div><input className="input" value={settings.name} onChange={e=>setSettings(s=>({...s,name:e.target.value}))} placeholder="e.g. Ahmad"/></div>
              <div><div className="lbl">Company Name</div><input className="input" value={settings.company} onChange={e=>setSettings(s=>({...s,company:e.target.value}))} placeholder="e.g. AZ Accounting & Web"/></div>
              <div><div className="lbl">Currency</div>
                <select className="select" value={settings.currency} onChange={e=>setSettings(s=>({...s,currency:e.target.value}))}>
                  <option value="RM">RM — Malaysian Ringgit</option>
                  <option value="USD">USD — US Dollar</option>
                  <option value="SGD">SGD — Singapore Dollar</option>
                  <option value="GBP">GBP — British Pound</option>
                </select>
              </div>
            </div>
          </div>

          <div className="card" style={{marginBottom:12}}>

                <div style={{position:"absolute",top:3,left:darkMode?22:3,width:20,height:20,borderRadius:10,background:"#fff",transition:"left .2s"}}/>
              </div>
            </div>
          </div>
          {/* Notifications */}
          <div className="card" style={{marginBottom:12}}>

            <button className="btn btn-gold btn-full" onClick={()=>{
              if(!("Notification" in window)){alert("Notifications not supported on this browser.");return;}

                setNotifGranted(p==="granted");
                if(p==="granted"){
                  new Notification("WorkDesk",{body:"Notifications enabled! You'll get renewal reminders and daily briefings.",icon:"/workdesk/icons/icon-192.png"});

                  alert("Please enable notifications in your browser/app settings.");

              });
            }}>{notifGranted?"✓ Notifications Enabled":"Enable Notifications"}</button>
          </div>
          {/* Data */}
          <div className="card" style={{marginBottom:12}}>

            <button className="btn btn-ghost btn-full" style={{color:"#ff6868",borderColor:"#2e1a1a"}} onClick={()=>{
              if(window.confirm("Clear ALL data? This cannot be undone.")){
                localStorage.clear();window.location.reload();

          </div>
          {/* About */}
          <div className="card">
            <div style={{fontSize:13,fontWeight:700,color:"var(--gold)",marginBottom:8}}>ℹ️ About</div>
            <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.6}}>WorkDesk v1.0 · Built for Malaysian freelancers & consultants · AI powered by Claude (Anthropic)</div>
          </div>
        </div>
      )}
    </div>
  );

  const viewTitle = NAV_ITEMS.find(n=>n.key===view)?.label||"WorkDesk";

  const statusLabel = isLunch?"🍽 Lunch":isOffice?"🏢 In Office":"🌙 Off Hours";


  return(
    <div className="app" style={darkMode?{}:{
      "--bg":"#f4f4fb","--bg2":"#eaeaf4","--bg3":"#e0e0ec",
      "--border":"#d0d0e0","--border2":"#c0c0d4",
      "--gold":"#9a6e00","--gold-dim":"#7a5200",

function TaskRow({task,clients,onToggle,onDelete,onEdit}){
  const cat=CATEGORIES[task.category]||CATEGORIES.admin;
  const pri=PRIORITIES[task.priority]||PRIORITIES.medium;
  const d=daysUntil(task.dueDate);
  const dl=dayLabel(d);
  const cl=clients.find(c=>c.id===task.clientId);
  const [swipeX,setSwipeX]=React.useState(0);
  const [swiping,setSwiping]=React.useState(false);
  const startXRef=React.useRef(0);
  const handleTouchStart=e=>{startXRef.current=e.touches[0].clientX;setSwiping(true);};
  const handleTouchMove=e=>{
    const dx=e.touches[0].clientX-startXRef.current;
    setSwipeX(Math.max(-90,Math.min(90,dx)));
  };
  const handleTouchEnd=()=>{
    if(swipeX<-60){onDelete(task.id);}
    else if(swipeX>60){onToggle(task.id);}
    setSwipeX(0);setSwiping(false);
  };
  const showLeft=swipeX>20;
  const showRight=swipeX<-20;
  return(
    <div style={{position:"relative",overflow:"hidden",borderRadius:12,marginBottom:8}}>
      {/* Swipe hints */}
      <div style={{position:"absolute",inset:0,borderRadius:12,background:showLeft?"#0e2e0e":showRight?"#2e0e0e":"transparent",display:"flex",alignItems:"center",justifyContent:showLeft?"flex-start":showRight?"flex-end":"center",padding:"0 18px",transition:"background .1s",pointerEvents:"none"}}>
        {showLeft&&<span style={{fontSize:18,color:"var(--green)",fontWeight:700}}>✓</span>}
        {showRight&&<span style={{fontSize:18,color:"var(--red)",fontWeight:700}}>✕</span>}
      </div>
      <div
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleTouchEnd}
        style={{transform:`translateX(${swipeX}px)`,transition:swiping?"none":"transform .2s ease"}}
        className="card-sm"
      >
      <div style={{display:"flex",alignItems:"flex-start",gap:10,opacity:task.done?.4:1}}>
      <div className={`cb${task.done?" on":""}`} style={{marginTop:2}} onClick={()=>onToggle(task.id)}>
        {task.done&&<span style={{fontSize:10,color:"#0d0d10",fontWeight:900}}>✓</span>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:600,fontSize:14,color:task.done?"#444":"var(--text)",textDecoration:task.done?"line-through":"none",marginBottom:5,lineHeight:1.3}}>{task.title}</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:4}}>
          <span className="pill" style={{background:cat.bg,color:cat.color}}>{cat.icon} {cat.label}</span>
          <span className="pill" style={{background:"#1a1014",color:pri.color}}>● {pri.label}</span>
        </div>
        <div style={{fontSize:12,color:"var(--text3)",display:"flex",gap:8,flexWrap:"wrap"}}>
          <span>📅 {fmtDate(task.dueDate)}{task.time?` · ${task.time}`:""}</span>
          {cl&&<span>👤 {cl.name}</span>}
          {!task.done&&<span style={{color:dl.color,fontWeight:600}}>{dl.text}</span>}
        </div>
      </div>
      <div style={{display:"flex",gap:5,flexShrink:0}}>
        <button className="btn btn-ghost btn-sm" style={{padding:"5px 8px",fontSize:12}} onClick={()=>onEdit(task)}>✏️</button>
        <button className="btn btn-red btn-sm" style={{padding:"5px 8px",fontSize:12}} onClick={()=>onDelete(task.id)}>✕</button>
      </div>
    </div>
    </div>
    </div>
  );
}

// SW registration
// ── Block pull-to-refresh only ─────────────────────────────────────────────
(function() {
  let startY         = 0;
  let startScrollTop = 0;
  let scrollEl       = null;

  document.addEventListener('touchstart', function(e) {
    startY         = e.touches[0].clientY;
    scrollEl       = null;
    startScrollTop = 0;
    let el = e.target;
    while (el && el !== document.documentElement) {
      const oy = window.getComputedStyle(el).overflowY;
      if ((oy === 'auto' || oy === 'scroll') && el.scrollHeight > el.clientHeight) {
        scrollEl       = el;
        startScrollTop = el.scrollTop;
        break;
      }
      el = el.parentElement;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!scrollEl) {
      e.preventDefault();
      return;
    }
    // ONLY block when touch started at the very top AND still at top
    // Use startScrollTop — NOT current scrollTop — so we never block mid-scroll
    if (startScrollTop <= 0 && scrollEl.scrollTop <= 0) {
      const dy = e.touches[0].clientY - startY;
      if (dy > 5) {
        // Deliberate downward pull from top = pull-to-refresh, block it
        e.preventDefault();
      }
    }
    // Everything else: let the browser handle naturally
  }, { passive: false });
})();

// FAB — show on scroll down, hide on scroll up ─────────────────────────────
(function() {
  let lastY = 0;
  let attached = false;

  function attachFabScroll() {
    const scroller = document.querySelector('.mobile-scroll');
    if (!scroller || attached) return;
    attached = true;
    scroller.addEventListener('scroll', function() {
      const fab = document.getElementById('fab-add');
      if (!fab) return;
      const st = scroller.scrollTop;
      if (st > lastY + 2) {
        fab.classList.add('fab-visible');
      } else if (st < lastY - 2) {
        fab.classList.remove('fab-visible');
      }
      lastY = st;
    }, { passive: true });
  }

  document.addEventListener('DOMContentLoaded', attachFabScroll);
  setTimeout(attachFabScroll, 500);
  setTimeout(attachFabScroll, 1500);
})();

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
